[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

[[redirects]]
  from = "/api/channel"
  to = "/.netlify/functions/channel"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
